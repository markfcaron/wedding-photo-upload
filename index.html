
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 1.5rem;
      max-width: 500px;
      margin: auto;
    }
    button {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<h2>Upload Photos</h2>

<form
  action="https://script.google.com/macros/s/AKfycbxo5nZVdE9xqoljXpdZyBRbo0aZETLhP84EkQ9l1xgf3avR4wBdG8OrXFdsCnXsIvBq4w/exec"
  method="post"
  enctype="multipart/form-data"
>
  <input
    type="file"
    name="file"
    accept="image/*"
    multiple
    required
  >
  <br>
  <button type="submit">Upload</button>
</form>

</body>
</html>
